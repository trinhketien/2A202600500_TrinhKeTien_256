services:
  - type: web
    name: covankn-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: PYTHON_VERSION
        value: "3.12.0"
